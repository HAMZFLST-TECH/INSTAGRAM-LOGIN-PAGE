<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Login Clone</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="main">

      <!-- LEFT SIDE -->

      <div class="left">
        <div class="logo">
          <img src="assets/logo.png" />
        </div>

        <div class="heading">
          See everyday moments from your

          <br />

          <span>close friends.</span>
        </div>

        <div class="photo">
          <img src="assets/photo.png" />
        </div>
      </div>

      <!-- RIGHT SIDE -->

      <div class="right">
        <div class="login">
          <h3>Log into Instagram</h3>

          <input placeholder="Mobile number, username or email" />

          <input placeholder="Password" type="password" />

          <button class="login-btn">Log in</button>

          <div class="fg-pass">Forgot password?</div>

          <div class="fb">Log in with Facebook</div>

          <div class="create">Create new account</div>

          <div class="meta">Meta</div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->

    <div class="footer">
      <a>Meta</a>
      <a>About</a>
      <a>Blog</a>
      <a>Jobs</a>
      <a>Help</a>
      <a>API</a>
      <a>Privacy</a>
      <a>Terms</a>
      <a>Locations</a>

      <br /><br />

      © 2026 Instagram from Meta | Cloned By HAMZFLST.TECH
    </div>
  </body>
</html>
